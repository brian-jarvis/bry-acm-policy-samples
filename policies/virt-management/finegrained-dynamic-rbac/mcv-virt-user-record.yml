---
object-templates-raw: |
  {{- range $mc := (lookup "cluster.open-cluster-management.io/v1" "ManagedCluster" "" "" "ocp-virt=enabled").items }}
  - complianceType: mustonlyhave
    objectDefinition:
      apiVersion: view.open-cluster-management.io/v1beta1
      kind: ManagedClusterView
      metadata:
        name: virt-user-record
        namespace: '{{ $mc.metadata.name }}'
        labels:
          virt-user-details: '{{ $mc.metadata.name }}'
      spec:
        scope:
          apiGroup: ""
          kind: ConfigMap
          name: virt-user-details
          namespace: default
          version: v1
  {{- end }}
